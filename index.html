/* ══════════════════════════════════════════════════
   MEJORA 1: SONIDO — Chime agradable para el taller
   Tres tonos: "new" (nuevo pedido), "done" (listo), "alert" (urgente)
══════════════════════════════════════════════════ */
function playChime(type = "new") {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const patterns = {
      new:   [[523.25,0],[659.25,.16],[783.99,.32]],  // Do-Mi-Sol (bienvenida)
      done:  [[783.99,0],[659.25,.16],[523.25,.32]],  // Sol-Mi-Do (completado)
      alert: [[880,0],[880,.22],[1046.5,.44]],         // La-La-Do (urgente)
    };
    (patterns[type]||patterns.new).forEach(([freq,delay]) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine"; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, ctx.currentTime+delay);
      gain.gain.linearRampToValueAtTime(.22, ctx.currentTime+delay+.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime+delay+.38);
      osc.start(ctx.currentTime+delay);
      osc.stop(ctx.currentTime+delay+.5);
    });
  } catch(e) { /* Navegador sin audio */ }
}

/* ══════════════════════════════════════════════════
   PIN DE SECRETARIA — Segunda capa de seguridad
   Solo aparece cuando alguien elige el rol Secretaria
══════════════════════════════════════════════════ */
function SecPINScreen({ onSuccess, onBack }) {
  const [pin, setPin]   = React.useState("");
  const [err, setErr]   = React.useState(false);
  const [shk, setShk]   = React.useState(false);
  const [tries, setTries] = React.useState(0);

  const add = d => {
    if (pin.length >= 6) return;
    const np = pin + d;
    setPin(np);
    if (np.length === 6) {
      setTimeout(() => {
        if (np === SEC_PIN) {
          sessionStorage.setItem("liz-sec-ok", "1");
          onSuccess();
        } else {
          const t = tries + 1;
          setTries(t);
          setErr(true); setShk(true); setPin("");
          setTimeout(() => { setErr(false); setShk(false); }, 1600);
        }
      }, 200);
    }
  };
  const del = () => setPin(p => p.slice(0, -1));

  return (
    <div className="sec-pin-wrap">
      <div className="sec-pin-lock">🔐</div>
      <div className="sec-pin-badge">Acceso Administración</div>
      <div className="sec-pin-title">Floristería Liz</div>
      <div className="sec-pin-sub">Ingresa el PIN de Secretaria</div>

      <div className="sec-pin-dots-wrap">
        <div className={"sec-pin-dots" + (shk ? " pin-shake" : "")}>
          {[0,1,2,3,4,5].map(i => (
            <div key={i} className={"sec-pin-dot" + (pin.length > i ? " filled" : "")} />
          ))}
        </div>
        <div className="sec-pin-err">
          {err ? `PIN incorrecto${tries >= 3 ? " — Habla con la administración" : ""}` : ""}
        </div>
      </div>

      <div className="sec-keypad">
        {[1,2,3,4,5,6,7,8,9].map(k => (
          <button key={k} type="button" className="sec-key-btn" onClick={() => add(k + "")}>{k}</button>
        ))}
        <button type="button" className="sec-key-btn empty" disabled></button>
        <button type="button" className="sec-key-btn" onClick={() => add("0")}>0</button>
        <button type="button" className="sec-key-btn del" onClick={del}>⌫</button>
      </div>

      <button type="button" className="sec-pin-back" onClick={onBack}>
        ← Volver al selector de rol
      </button>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   PIN GLOBAL
══════════════════════════════════════════════════ */
function PINScreen({ onSuccess }) {
  const [pin,setPin]=React.useState(""); const [err,setErr]=React.useState(false); const [shk,setShk]=React.useState(false);
  const add = d => {
    if(pin.length>=6) return; const np=pin+d; setPin(np);
    if(np.length===6) setTimeout(()=>{
      if(np===APP_PIN){sessionStorage.setItem("liz-pin-ok","1");onSuccess();}
      else{setErr(true);setShk(true);setPin("");setTimeout(()=>{setErr(false);setShk(false);},1600);}
    },200);
  };
  const del = ()=>setPin(p=>p.slice(0,-1));
  return (
    <div className="pin-screen">
      <style>{CSS}</style>
      <img src={LIZ_LOGO} className="pin-logo" onError={e=>e.target.style.display="none"} alt="" />
      <div className="pin-brand">Floristería Liz</div>
      <div className="pin-sub">Centro Operativo</div>
      <div style={{fontSize:13,color:"var(--text2)",fontWeight:600,marginBottom:16}}>Ingresa el PIN de acceso</div>
      <div className={"pin-dots"+(shk?" pin-shake":"")}>
        {[0,1,2,3,4,5].map(i=><div key={i} className={"pin-dot"+(pin.length>i?" filled":"")}/>)}
      </div>
      <div className="pin-err">{err?"PIN incorrecto. Intenta de nuevo.":""}</div>
      <div className="keypad">
        {[1,2,3,4,5,6,7,8,9].map(k=><button key={k} type="button" className="key-btn" onClick={()=>add(k+"")}>{k}</button>)}
        <button type="button" className="key-btn empty" disabled></button>
        <button type="button" className="key-btn" onClick={()=>add("0")}>0</button>
        <button type="button" className="key-btn del" onClick={del}>⌫</button>
      </div>
      <div style={{marginTop:24,fontSize:11,color:"var(--text3)"}}>Pregunta el PIN al administrador</div>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   APP PRINCIPAL
══════════════════════════════════════════════════ */
function FloristeriaLizApp() {
  const [pinOk,     setPinOk]     = React.useState(sessionStorage.getItem("liz-pin-ok")==="1");
  const [secPinOk,  setSecPinOk]  = React.useState(sessionStorage.getItem("liz-sec-ok")==="1");
  const [loading,   setLoading]   = React.useState(true);
  const [role,      setRole]      = React.useState(null);
  const [user,      setUser]      = React.useState(null);
  const [orders,    setOrders]    = React.useState([]);
  const [view,      setView]      = React.useState("list");
  const [selOrd,    setSelOrd]    = React.useState(null);
  const [toast,     setToast]     = React.useState(null);
  const [syncing,   setSyncing]   = React.useState(true);
  const [connected, setConnected] = React.useState(true);
  /* MEJORA 1 SONIDO: Para detectar pedidos nuevos */
  const prevRef = React.useRef([]);

  React.useEffect(()=>{
    if(document.querySelector('link[rel="manifest"]')) return;
    const m={name:"Floristería Liz — Ops",short_name:"Liz Ops",theme_color:"#5c1370",background_color:"#fdf8ff",display:"standalone",orientation:"portrait",start_url:"/",icons:[{src:"https://floristerializ.com/data/cropped-boton-liz-270x270.png",sizes:"270x270",type:"image/png"}]};
    const l=document.createElement("link"); l.rel="manifest"; l.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/json"})); document.head.appendChild(l);
  },[]);

  React.useEffect(()=>{
    const unsub=db.collection("pedidos").orderBy("createdAt","desc").onSnapshot(
      snap=>{
        const newOrds=snap.docs.map(d=>({id:d.id,...d.data()}));
        /* MEJORA 1 SONIDO: Detectar pedidos nuevos asignados al florista actual */
        if(prevRef.current.length>0 && role && user){
          const prevIds=new Set(prevRef.current.map(o=>o.id));
          const added=newOrds.filter(o=>!prevIds.has(o.id));
          if(added.length>0){
            const mine=added.filter(o=>o.decorator===user);
            const urgent=added.filter(o=>o.urgente&&o.decorator===user);
            if(urgent.length>0){ playChime("alert"); }
            else if(mine.length>0){ playChime("new"); }
          }
          /* Detectar cuando un pedido mío queda listo (para la secretaria) */
          if(role==="secretary"){
            const nowListo=newOrds.filter(o=>o.status==="listo");
            const wasListo=new Set(prevRef.current.filter(o=>o.status==="listo").map(o=>o.id));
            if(nowListo.some(o=>!wasListo.has(o.id))) playChime("done");
          }
        }
        prevRef.current=newOrds;
        setOrders(newOrds); setLoading(false); setConnected(true); setSyncing(true); setTimeout(()=>setSyncing(false),2000);
      },
      ()=>{setLoading(false);setConnected(false);}
    );
    return unsub;
  },[role,user]);

  const notify=msg=>{setToast(msg);setTimeout(()=>setToast(null),3200);};
  const addOrd=async data=>{const now=Date.now();await db.collection("pedidos").add({...data,status:"pendiente",dPhoto:null,ePhoto:null,createdAt:now,updatedAt:now}).then(()=>{setView("list");notify("¡Pedido creado! 🌸");}).catch(()=>notify("❌ Error al guardar."));};
  const updOrd=async(id,ch)=>{await db.collection("pedidos").doc(id).update({...ch,updatedAt:Date.now()}).then(()=>notify("Estado actualizado ✓")).catch(()=>notify("❌ Error."));};

  if(!pinOk) return <PINScreen onSuccess={()=>setPinOk(true)}/>;
  if(loading) return(<><style>{CSS}</style><div className="loader"><img src={LIZ_LOGO} className="loader-logo" onError={e=>e.target.style.display="none"} alt=""/><div className="loader-title">Floristería Liz</div><div className="spinner"/><div className="loader-sub">Conectando...</div></div></>);
  if(!role) return(<><style>{CSS}</style><RoleSel onSel={(r,n)=>{setRole(r);setUser(n);}}/></>);

  /* ── MODO TV: sin PIN de secretaria, acceso directo ── */
  if(role==="tv") return(
    <><style>{CSS}</style>
    <TVView orders={orders} onExit={()=>{setRole(null);setUser(null);}}/>
    </>
  );

  /* ── SEGUNDA CAPA: PIN de Secretaria ── */
  if(role==="secretary" && !secPinOk) return(
    <><style>{CSS}</style>
    <SecPINScreen
      onSuccess={()=>setSecPinOk(true)}
      onBack={()=>{ setRole(null); setUser(null); }}
    /></>
  );

  /* MEJORA 3: Modo Kiosko — pantalla especial */
  if(role==="kiosko") return(
    <><style>{CSS}</style>
    <KioskoView orders={orders} user={user} onUpdate={updOrd} onExit={()=>{setRole(null);setUser(null);setView("list");setSelOrd(null);}} notify={notify}/>
    </>
  );

  const rl={secretary:"Secretaria",decorator:"Florista",driver:"Repartidor"};
  const selOrder=orders.find(o=>o.id===selOrd?.id);
  return(
    <div className="app">
      <style>{CSS}</style>
      {toast&&<div className="toast">{toast}</div>}
      {syncing&&<div className="sync"><span className="sync-dot"/>Conectado</div>}
      <header className="hdr">
        <div className="hdr-r">
          <div className="hdr-brand">
            <img src={LIZ_LOGO} alt="" className="hdr-logo" onError={e=>e.target.style.display="none"}/>
            <div><div className="hdr-name">Floristería Liz</div><div className="hdr-sub">{rl[role]} — {user}</div></div>
          </div>
          <div className="hdr-right">
            <span className={"hdr-dot"+(connected?"":" off")} title={connected?"En línea":"Sin conexión"}/>
            <button type="button" className="hdr-exit" onClick={()=>{setRole(null);setUser(null);setView("list");setSelOrd(null);setSecPinOk(false);sessionStorage.removeItem("liz-sec-ok");}}>Salir</button>
          </div>
        </div>
      </header>
      <main className="main">
        {role==="secretary"&&view==="list"   &&<SecView orders={orders} onSel={o=>{setSelOrd(o);setView("detail");}} onNew={()=>setView("new")}/>}
        {role==="secretary"&&view==="new"    &&<NewForm onSubmit={addOrd} onCancel={()=>setView("list")}/>}
        {role==="secretary"&&view==="detail" &&<OrdDet order={selOrder} onBack={()=>setView("list")} onUpdate={updOrd} notify={notify}/>}
        {role==="decorator"&&view==="list"   &&<DecView orders={orders} user={user} onSel={o=>{setSelOrd(o);setView("detail");}}/>}
        {role==="decorator"&&view==="detail" &&<OrdDet order={selOrder} onBack={()=>setView("list")} onUpdate={updOrd} notify={notify} isDec/>}
        {role==="driver"   &&view==="list"   &&<DriView orders={orders} user={user} onSel={o=>{setSelOrd(o);setView("detail");}}/>}
        {role==="driver"   &&view==="detail" &&<OrdDet order={selOrder} onBack={()=>setView("list")} onUpdate={updOrd} notify={notify} isDri/>}
      </main>
    </div>
  );
}

/* ══════════════════════════════════════════════════
   MEJORA 3: MODO KIOSKO — Pantalla grande del taller
   Sin distracción, letras grandes, auto-refresh visual
══════════════════════════════════════════════════ */
function KioskoView({ orders, user, onUpdate, onExit, notify }) {
  const [newAlert,  setNewAlert]  = React.useState(null);
  const [uploading, setUploading] = React.useState({});
  const fileRefs = React.useRef({});
  const prevCount = React.useRef(0);

  const mine = orders
    .filter(o=>o.decorator===user&&["pendiente","en_produccion","listo"].includes(o.status))
    .sort((a,b)=>{ if(a.urgente&&!b.urgente) return -1; if(!a.urgente&&b.urgente) return 1; return STATUS_ORDER.indexOf(a.status)-STATUS_ORDER.indexOf(b.status); });

  /* Detectar pedido nuevo en kiosko — alerta visual + sonido */
  React.useEffect(()=>{
    if(prevCount.current>0 && mine.length>prevCount.current){
      const newest=mine[0];
      setNewAlert(newest.productName||"Nuevo pedido");
      setTimeout(()=>setNewAlert(null),4000);
      playChime(mine.find(o=>o.urgente)?"alert":"new");
    }
    prevCount.current=mine.length;
  },[mine.length]);

  const handlePhoto=(orderId,e)=>{
    const file=e.target.files[0]; if(!file) return;
    setUploading(u=>({...u,[orderId]:true}));
    const r=new FileReader(); r.onloadend=()=>{
      const img=new Image(); img.src=r.result; img.onload=async()=>{
        const canvas=document.createElement("canvas"); const MAX=800; let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h*=MAX/w;w=MAX;}}else{if(h>MAX){w*=MAX/h;h=MAX;}}
        canvas.width=w; canvas.height=h; canvas.getContext("2d").drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",.65);
        try{const url=await uploadPhoto(b64,orderId,"taller"); await onUpdate(orderId,{dPhoto:url,status:"listo",finishedAt:Date.now()});}
        catch{onUpdate(orderId,{dPhoto:b64,status:"listo",finishedAt:Date.now()});}
        finally{setUploading(u=>{const n={...u};delete n[orderId];return n;});}
      };
    }; r.readAsDataURL(file);
  };

  return(
    <div className="kiosko-wrap">
      {newAlert&&<div className="kiosko-new-alert">🌸 NUEVO PEDIDO — {newAlert}</div>}
      <div className="kiosko-hdr">
        <div className="kiosko-hdr-brand">
          <img src={LIZ_LOGO} className="kiosko-logo" onError={e=>e.target.style.display="none"} alt=""/>
          <div><div className="kiosko-hdr-name">Taller — {user}</div><div className="kiosko-hdr-sub">Floristería Liz · Modo Kiosko</div></div>
        </div>
        <span className="kiosko-hdr-dot"/>
      </div>

      <div className="kiosko-body">
        <div className="kiosko-counter">
          <div className="kiosko-counter-n">{mine.length}</div>
          <div className="kiosko-counter-l">{mine.length===1?"pedido pendiente":"pedidos pendientes"} · {mine.filter(o=>o.urgente).length} urgentes ⚡</div>
        </div>

        {mine.length===0?(
          <div className="kiosko-empty">
            <span className="kiosko-empty-ic">✅</span>
            <div className="kiosko-empty-txt">¡Todo al día!<br/>No hay pedidos pendientes.<br/><br/>Esta pantalla se actualiza automáticamente.</div>
          </div>
        ):mine.map(o=>{
          const cfg=SC[o.status]||SC.pendiente; const isUpl=!!uploading[o.id];
          if(!fileRefs.current[o.id]) fileRefs.current[o.id]=React.createRef();
          return(
            <div key={o.id} className={"kiosko-card"+(o.urgente?" urgente":"")}>
              <div className="kiosko-status-bar" style={{background:cfg.dot}}/>
              {o.urgente&&<div style={{marginBottom:8}}><span style={{background:"#dc2626",color:"#fff",fontSize:12,fontWeight:800,padding:"4px 12px",borderRadius:12}}>⚡ URGENTE</span></div>}
              <div style={{marginBottom:6}}><span className="sbadge" style={{color:cfg.color,background:cfg.bg}}><span className="sdot" style={{background:cfg.dot}}></span>{cfg.label}</span></div>
              <div className="kiosko-prod-name">{o.productName}</div>
              <div className="kiosko-client">👤 {o.clientName}</div>
              <div className="kiosko-detail">
                ⏰ Entrega: <strong>{o.deliveryTime||"Flexible"}</strong>
                {o.price&&<span> · 💰 {COP(o.price)}</span>}
                {o.pago&&<span> · {PAGO_IC[o.pago]} {o.pago}</span>}
              </div>
              {o.notes&&<div className="kiosko-note">📝 "{o.notes}"</div>}
              {o.productUrl&&<a href={o.productUrl} target="_blank" rel="noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,color:"var(--mid)",fontSize:13,fontWeight:600,textDecoration:"none",marginBottom:10}}>🔗 Ver diseño de referencia</a>}

              {o.status==="pendiente"&&(
                <button type="button" className="kiosko-btn init" onClick={()=>onUpdate(o.id,{status:"en_produccion"})}>
                  🛠️ Iniciar Fabricación
                </button>
              )}
              {o.status==="en_produccion"&&(<>
                <input type="file" accept="image/*" capture="environment" style={{position:"fixed",left:-9999,opacity:0}} ref={fileRefs.current[o.id]} onChange={e=>handlePhoto(o.id,e)}/>
                {isUpl?(
                  <div className="kiosko-upload"><div className="spinner" style={{width:20,height:20,borderWidth:2}}/>Subiendo foto...</div>
                ):(
                  <button type="button" className="kiosko-btn photo" onClick={()=>fileRefs.current[o.id]?.current?.click()}>
                    📸 Terminar y Fotografiar Arreglo
                  </button>
                )}
                {o.dPhoto&&<img src={o.dPhoto} className="kiosko-photo-prev"/>}
              </>)}
              {o.status==="listo"&&(<>
                <div className="kiosko-done-badge">✅ Listo — el domiciliario lo recogerá pronto</div>
                {o.dPhoto&&<img src={o.dPhoto} className="kiosko-photo-prev"/>}
              </>)}
            </div>
          );
        })}

        <button type="button" className="kiosko-exit" onClick={onExit}>
          Salir del modo kiosko
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════

/* ══════════════════════════════════════════════════
   VISTA SECRETARIA
══════════════════════════════════════════════════ */
function SecView({ orders, onSel, onNew }) {
  const [dayF,setDayF]=React.useState("hoy"); const [tab,setTab]=React.useState("pedidos"); const [search,setSearch]=React.useState("");
  const filtered=orders.filter(o=>dayF==="hoy"?isToday(o.createdAt):dayF==="ayer"?isYesterday(o.createdAt):true);
  const searched=React.useMemo(()=>{
    let r=filtered; if(search.trim()){const s=search.toLowerCase();r=r.filter(o=>o.clientName?.toLowerCase().includes(s)||o.clientAddress?.toLowerCase().includes(s)||o.productName?.toLowerCase().includes(s)||o.orderNum?.toLowerCase().includes(s));}
    return [...r].sort((a,b)=>{if(a.urgente&&!b.urgente)return -1;if(!a.urgente&&b.urgente)return 1;return STATUS_ORDER.indexOf(a.status)-STATUS_ORDER.indexOf(b.status);});
  },[filtered,search]);
  const cnt=st=>filtered.filter(o=>o.status===st).length;
  const totF=filtered.filter(o=>o.status==="entregado").reduce((a,o)=>a+(o.price||0),0);
  const totP=filtered.reduce((a,o)=>a+(o.price||0),0);
  const handleExport=()=>{
    let csv="\uFEFF#Pedido,Estado,Destinatario,Celular,Dirección,Arreglo,Precio,Pago,Florista,Repartidor,Hora,Tiempo Elaboración,Fecha\n";
    filtered.forEach(o=>{const cl=t=>t?String(t).replace(/,/g," ").replace(/\n/g," "):""; const tp=o.finishedAt?formatTime(o.finishedAt-o.createdAt):"—"; csv+=[cl(o.orderNum||o.id),cl(o.status),cl(o.clientName),cl(o.clientPhone),cl(o.clientAddress),cl(o.productName),o.price||0,cl(o.pago||"—"),cl(o.decorator),cl(o.deliveryPerson||"—"),cl(o.deliveryTime||"Flexible"),tp,new Date(o.createdAt).toLocaleString("es-CO")].join(",")+"\n";});
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"})); a.download="Liz_"+dayF+"_"+new Date().toLocaleDateString("es-CO")+".csv"; a.click();
  };
  return(
    <div className="fade">
      <div className="banner"><div><div className="ban-l">Panel del día</div><div className="ban-n">{filtered.length}</div><div className="ban-s">Facturado: {COP(totF)} / {COP(totP)}</div></div><button type="button" className="ban-btn" onClick={onNew}>+ Nuevo</button></div>
      <div className="tabs"><button type="button" className={"tab-btn"+(tab==="pedidos"?" on":"")} onClick={()=>setTab("pedidos")}>📋 Pedidos</button><button type="button" className={"tab-btn"+(tab==="stats"?" on":"")} onClick={()=>setTab("stats")}>📊 Estadísticas</button></div>
      {tab==="stats"?<StatsView orders={filtered}/>:(
        <>
          <div className="day-row">
            <div className="chips">{[["hoy","🌸 Hoy"],["ayer","⏳ Ayer"],["todos","📋 Todos"]].map(([k,l])=><button key={k} type="button" className={"chip"+(dayF===k?" on":"")} onClick={()=>setDayF(k)}>{l}</button>)}</div>
            <button type="button" className="btn-export" onClick={handleExport}>📥 Excel</button>
          </div>
          <div className="stats">
            {[["pendiente","#d97706","Pend."],["en_produccion","var(--mid)","Taller"],["listo","#16a34a","Listos"],["en_camino","#2563eb","En Ruta"]].map(([k,c,l])=>(
              <div key={k} className="stat"><div className="stat-n" style={{color:c}}>{cnt(k)}</div><div className="stat-l">{l}</div></div>
            ))}
          </div>
          <div className="search-wrap">
            <span className="search-ic">🔍</span>
            <input type="text" className="search-in" placeholder="Buscar por nombre, dirección o arreglo..." value={search} onChange={e=>setSearch(e.target.value)}/>
            {search&&<button type="button" className="search-clear" onClick={()=>setSearch("")}>✕</button>}
          </div>
          {search&&<div style={{fontSize:12,color:"var(--text3)",marginBottom:12}}>{searched.length} resultado(s) para "{search}"</div>}
          {searched.length===0?<EmptyState text={search?"Sin resultados para ese criterio.":"Sin pedidos en este período."}/>:searched.map(o=><OrdCard key={o.id} o={o} onClick={()=>onSel(o)}/>)}
        </>
      )}
    </div>
  );
}

function StatsView({orders}){
  const ent=orders.filter(o=>o.status==="entregado"); const totF=ent.reduce((a,o)=>a+(o.price||0),0);
  const fStats=DECORATORS.filter(d=>d!=="INVITADO").map(d=>{const m=orders.filter(o=>o.decorator===d); const done=m.filter(o=>["listo","en_camino","entregado"].includes(o.status)); const times=done.filter(o=>o.finishedAt).map(o=>o.finishedAt-o.createdAt); const avg=times.length?Math.round(times.reduce((a,b)=>a+b,0)/times.length):null; return{name:d,total:m.length,done:done.length,avg};}).filter(d=>d.total>0).sort((a,b)=>b.total-a.total);
  const maxO=Math.max(...fStats.map(d=>d.total),1); const medals=["🥇","🥈","🥉"];
  const sStats=Object.entries(SC).map(([k,v])=>({key:k,label:v.label,count:orders.filter(o=>o.status===k).length,dot:v.dot})).filter(s=>s.count>0);

  return(
    <div className="fade">
      <div className="stats-rev-grid">

        <div className="stats-card"><div style={{fontSize:10,color:"var(--text3)",textTransform:"uppercase",letterSpacing:1.2,fontWeight:600,marginBottom:8}}>Total</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:"var(--deep)"}}>{orders.length}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:5}}>{orders.filter(o=>o.urgente).length} urgentes ⚡</div></div>
      </div>
      <div className="dt-card" style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>Estado de pedidos</div>
        {sStats.map(s=><div key={s.key} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}><span style={{width:8,height:8,borderRadius:"50%",background:s.dot,flexShrink:0}}></span><div style={{flex:1,fontSize:13}}>{s.label}</div><span style={{fontSize:13,fontWeight:700,color:"var(--deep)",minWidth:20,textAlign:"right"}}>{s.count}</span><div className="prog-bar" style={{width:80}}><div className="prog-fill" style={{width:Math.round(s.count/orders.length*100)+"%",background:s.dot}}></div></div></div>)}
      </div>
      {fStats.length>0&&<div className="dt-card" style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>🏆 Rendimiento floristas</div>
        {fStats.map((f,i)=><div key={f.name} className="florista-row"><span style={{fontSize:16,minWidth:24}}>{medals[i]||"  "}</span><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:14,fontWeight:700}}>{f.name}</span><div style={{display:"flex",gap:10,alignItems:"center"}}>{f.avg&&<span style={{fontSize:11,color:"var(--text3)"}}>⏱ {formatTime(f.avg)}</span>}<span style={{fontSize:15,fontWeight:800,color:"var(--mid)"}}>{f.total}</span></div></div><div className="prog-bar"><div className="prog-fill" style={{width:Math.round(f.total/maxO*100)+"%"}}></div></div></div></div>)}
      </div>}
      {pStats.length>0&&<div className="dt-card"><div style={{fontSize:13,fontWeight:700,color:"var(--text)",marginBottom:14}}>💳 Métodos de pago</div>{pStats.map(p=><div key={p.name} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--bd)"}}><span style={{fontSize:13}}>{PAGO_IC[p.name]} {p.name}</span><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:13,fontWeight:700,color:"var(--deep)"}}>{p.count}</span><div className="prog-bar" style={{width:70}}><div className="prog-fill" style={{width:Math.round(p.count/orders.length*100)+"%"}}></div></div></div></div>)}</div>}
      {orders.length===0&&<EmptyState text="Sin datos para este período."/>}
    </div>
  );
}

        <label className="f-l">Enlace de la tienda</label>

      </div>
      <div className="form-card">
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}><span className="step-num">2</span><span style={{fontSize:13,fontWeight:700,color:"var(--deep)",textTransform:"uppercase",letterSpacing:".5px"}}>Destinatario</span></div>

/* ══════════════════════════════════════════════════
   DETALLE DE PEDIDO — con Historial del cliente
══════════════════════════════════════════════════ */
function OrdDet({order,onBack,onUpdate,notify,isDec,isDri}){
  const fileRef=React.useRef(); const [uploading,setUploading]=React.useState(false);
  if(!order) return <div style={{padding:20,color:"var(--text3)"}}>Cargando...</div>;
  const cfg=SC[order.status]||SC.pendiente; const timeProd=order.finishedAt?formatTime(order.finishedAt-order.createdAt):null;
  const handlePhoto=async e=>{
    const file=e.target.files[0]; if(!file) return; setUploading(true);
    const r=new FileReader(); r.onloadend=()=>{
      const img=new Image(); img.src=r.result; img.onload=async()=>{
        const canvas=document.createElement("canvas"); const MAX=800; let w=img.width,h=img.height;
        if(w>h){if(w>MAX){h*=MAX/w;w=MAX;}}else{if(h>MAX){w*=MAX/h;h=MAX;}}
        canvas.width=w; canvas.height=h; canvas.getContext("2d").drawImage(img,0,0,w,h);
        const b64=canvas.toDataURL("image/jpeg",.65);
        try{const url=await uploadPhoto(b64,order.id,isDec?"taller":"entrega"); if(isDec) await onUpdate(order.id,{dPhoto:url,status:"listo",finishedAt:Date.now()}); if(isDri) await onUpdate(order.id,{ePhoto:url,status:"entregado"});}
        catch{if(isDec) onUpdate(order.id,{dPhoto:b64,status:"listo",finishedAt:Date.now()}); if(isDri) onUpdate(order.id,{ePhoto:b64,status:"entregado"});}
        finally{setUploading(false);}
      };
    }; r.readAsDataURL(file);
  };
  return(
    <div className="fade">
      <button type="button" className="dt-back" onClick={onBack}>← Volver al listado</button>
      <div className="dt-hero">
        {order.urgente&&<div style={{marginBottom:10}}><span className="urgente-badge">⚡ PEDIDO URGENTE</span></div>}
        <div className="dt-hero-icon">💐</div>
        {order.orderNum&&<div style={{fontSize:11,color:"var(--text3)",fontFamily:"monospace",marginTop:8}}>#{order.orderNum}</div>}
        <div style={{fontSize:17,fontWeight:800,color:"var(--text)",marginTop:10,lineHeight:1.3}}>{order.productName}</div>
        <div style={{fontSize:20,color:"var(--mid)",fontWeight:800,marginTop:5}}>{COP(order.price||0)}</div>
        {order.pago&&<div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{PAGO_IC[order.pago]} {order.pago}</div>}
        <div style={{marginTop:10}}><span className="sbadge" style={{color:cfg.color,background:cfg.bg}}><span className="sdot" style={{background:cfg.dot}}></span>{cfg.label}</span></div>
        {timeProd&&<div style={{fontSize:12,color:"#15803d",fontWeight:700,marginTop:8}}>✓ Elaborado en {timeProd}</div>}
        {order.productUrl&&<a href={order.productUrl} target="_blank" rel="noreferrer" className="btn-web" style={{marginTop:14}}>🌐 Ver diseño en floristerializ.com</a>}
      </div>

      {/* MEJORA 2: Historial del cliente — solo para secretaria */}
      {!isDec&&!isDri&&<ClientHistory phone={order.clientPhone} currentId={order.id}/>}

      {!isDec&&!isDri&&(order.dPhoto||order.ePhoto)&&(
        <div className="ev-section">
          <div style={{fontSize:13,fontWeight:700,color:"#065f46",marginBottom:6}}>📸 Evidencias</div>
          <div className="ev-grid">
            {order.dPhoto&&<div className="ev-card"><div style={{fontSize:10,color:"#16a34a",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Taller</div><img src={order.dPhoto} style={{width:"100%",borderRadius:10,maxHeight:120,objectFit:"cover"}}/><a href={order.dPhoto} download={"Taller_"+order.clientName+".jpg"} className="ev-btn-dl" style={{background:"#16a34a"}}>💾 Guardar</a></div>}
            {order.ePhoto&&<div className="ev-card"><div style={{fontSize:10,color:"#1d4ed8",fontWeight:700,textTransform:"uppercase",marginBottom:8}}>Entrega</div><img src={order.ePhoto} style={{width:"100%",borderRadius:10,maxHeight:120,objectFit:"cover"}}/><a href={order.ePhoto} download={"Ruta_"+order.clientName+".jpg"} className="ev-btn-dl" style={{background:"#1d4ed8"}}>💾 Guardar</a></div>}
          </div>
        </div>
      )}
      <div className="dt-card">
        <div className="dt-row"><div className="dt-ic">⏱️</div><div><div className="dt-k">Productividad</div><div className="dt-v">{order.finishedAt?<span style={{color:"#15803d",fontWeight:700}}>✓ Finalizado en {timeProd}</span>:<span style={{color:"#92400e",fontWeight:700}}>⏳ {formatTime(Date.now()-order.createdAt)} transcurridos</span>}</div></div></div>
        <div className="dt-row"><div className="dt-ic">👤</div><div><div className="dt-k">Destinatario</div><div className="dt-v">{order.clientName}</div></div></div>
        <div className="dt-row"><div className="dt-ic">📞</div><div><div className="dt-k">Celular</div><div className="dt-v">{order.clientPhone||"No registrado"}</div>{order.clientPhone&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:6}}><a href={tel(order.clientPhone)} className="btn-call">📞 Llamar</a><a href={wa(order.clientPhone)} target="_blank" rel="noreferrer" className="btn-wam">💬 WhatsApp</a></div>}</div></div>
        <div className="dt-row"><div className="dt-ic">📍</div><div><div className="dt-k">Dirección</div><div className="dt-v">{order.clientAddress}</div><a href={gmap(order.clientAddress)} target="_blank" rel="noreferrer" className="btn-maps">🗺️ Google Maps</a></div></div>
        <div className="dt-row"><div className="dt-ic">⏰</div><div><div className="dt-k">Hora prometida</div><div className="dt-v" style={{fontWeight:700}}>{order.deliveryTime||"Flexible"}</div></div></div>
        {order.notes&&<div className="dt-row"><div className="dt-ic">📝</div><div><div className="dt-k">Dedicatoria</div><div className="dt-v" style={{background:"#fff5f5",color:"#b91c1c",fontWeight:600,padding:"8px 12px",borderRadius:10,border:"1px solid #fed7d7",marginTop:4}}>{order.notes}</div></div></div>}
        <div className="dt-row"><div className="dt-ic">🎨</div><div><div className="dt-k">Personal</div><div className="dt-v">Florista: <strong>{order.decorator}</strong> · Repartidor: <strong>{order.deliveryPerson||"Por asignar"}</strong></div></div></div>
      </div>
      {!isDec&&!isDri&&order.clientPhone&&<button type="button" className="btn-wa-share" onClick={()=>shareWA(order)}>💬 Compartir estado por WhatsApp</button>}
      {!isDec&&!isDri&&(<div className="dt-card" style={{marginTop:4}}>
        <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Acciones</div>
        {order.status==="pendiente"&&<button type="button" className="btn-p" onClick={()=>onUpdate(order.id,{status:"en_produccion"})}>🛠️ Enviar a taller</button>}
        {order.status==="listo"&&(<><div style={{fontSize:12,color:"var(--text2)",marginBottom:8}}>Asignar repartidor:</div><div className="dg">{DRIVERS.map(dr=><button key={dr} type="button" className="db" onClick={()=>onUpdate(order.id,{deliveryPerson:dr,status:"en_camino"})}>🛵 {dr}</button>)}</div></>)}
        {order.status==="en_camino"&&<button type="button" className="btn-g" onClick={()=>onUpdate(order.id,{status:"entregado"})}>✓ Marcar entregado</button>}
        <button type="button" className="btn-gh" onClick={onBack}>← Regresar</button>
      </div>)}
      {isDec&&(<div className="dt-card" style={{borderColor:"rgba(197,143,235,.5)"}}>
        <div style={{fontSize:14,fontWeight:700,color:"var(--deep)",marginBottom:12}}>Taller</div>
        {order.status==="pendiente"&&<button type="button" className="btn-p" onClick={()=>onUpdate(order.id,{status:"en_produccion"})}>🛠️ Iniciar fabricación</button>}
        {order.status==="en_produccion"&&(<><div style={{fontSize:13,color:"var(--deep)",fontWeight:600,marginBottom:4}}>Fotografía el arreglo terminado para marcarlo como Listo.</div><input type="file" accept="image/*" capture="environment" className="ph-in" ref={fileRef} onChange={handlePhoto}/>{uploading?<div className="ph-upload"><div className="spinner" style={{width:18,height:18,borderWidth:2}}/>Subiendo foto...</div>:<button type="button" className="ph-btn" onClick={()=>fileRef.current.click()}>📸 Fotografiar arreglo terminado</button>}</>)}
        {order.dPhoto&&<div><div className="dt-k" style={{marginTop:12}}>Foto:</div><img src={order.dPhoto} className="ph-img"/></div>}
        {order.status==="listo"&&<div style={{background:"#dcfce7",borderRadius:16,padding:14,textAlign:"center",fontSize:14,fontWeight:700,color:"#15803d",marginTop:4}}>✅ Listo — esperando al repartidor</div>}
      </div>)}
      {isDri&&(<div className="dt-card" style={{borderColor:"rgba(59,130,246,.4)"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#1e40af",marginBottom:8}}>Mi ruta</div>
        <a href={gmap(order.clientAddress)} target="_blank" rel="noreferrer" className="btn-maps" style={{display:"inline-flex",marginBottom:10}}>🗺️ Abrir Maps</a>
        {order.clientPhone&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}><a href={tel(order.clientPhone)} className="btn-call">📞 Llamar</a><a href={wa(order.clientPhone)} target="_blank" rel="noreferrer" className="btn-wam">💬 WA</a></div>}
        {order.status==="listo"&&<button type="button" className="btn-b" onClick={()=>onUpdate(order.id,{deliveryPerson:order.deliveryPerson,status:"en_camino"})}>🚀 Iniciar ruta</button>}
        {order.status==="en_camino"&&(<><input type="file" accept="image/*" capture="environment" className="ph-in" ref={fileRef} onChange={handlePhoto}/>{uploading?<div className="ph-upload"><div className="spinner" style={{width:18,height:18,borderWidth:2}}/>Subiendo...</div>:<button type="button" className="ph-btn" style={{borderColor:"#3b82f6",color:"#1e40af"}} onClick={()=>fileRef.current.click()}>📸 Fotografiar entrega en destino</button>}</>)}
        {order.ePhoto&&<div><div className="dt-k" style={{marginTop:12}}>Foto entrega:</div><img src={order.ePhoto} className="ph-img"/></div>}
      </div>)}
      <div style={{height:20}}/>

/* ══════════════════════════════════════════════════

══════════════════════════════════════════════════ */
function DecView({orders,user,onSel}){
  const mine=orders.filter(o=>o.decorator===user&&["pendiente","en_produccion","listo"].includes(o.status)).sort((a,b)=>(b.urgente?1:0)-(a.urgente?1:0));
  return(<div className="fade">
    <div className="banner"><div><div className="ban-l">Mi mesa de trabajo</div><div className="ban-n">{mine.length}</div><div className="ban-s">{mine.filter(o=>o.urgente).length} urgentes ⚡</div></div></div>
    {mine.length===0?<EmptyState text="Estás al día ✓"/>:mine.map(o=>(
      <div key={o.id} className={"tc"+(o.urgente?" urgente":"")}>
        <div className="tc-top"><div className="tc-icon">💐</div><div style={{flex:1}}><div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}><span style={{fontSize:15,fontWeight:800}}>{o.productName}</span>{o.urgente&&<span className="urgente-badge">⚡</span>}</div><div style={{fontSize:15,color:"var(--mid)",fontWeight:800,marginTop:3}}>{COP(o.price||0)}</div><div style={{marginTop:6}}><span className="sbadge" style={{color:SC[o.status]?.color,background:SC[o.status]?.bg}}><span className="sdot" style={{background:SC[o.status]?.dot}}></span>{SC[o.status]?.label}</span></div></div></div>
        <div className="tc-info"><div className="tc-info-title">Detalles</div><div className="tc-row">👤 {o.clientName}</div><div className="tc-row">🕐 {o.deliveryTime||"Flexible"}</div>{o.notes&&<div className="tc-note">📝 <em>{o.notes}</em></div>}</div>
        <button type="button" className="btn-p" onClick={()=>onSel(o)}>{o.status==="pendiente"?"🛠️ Iniciar":o.status==="en_produccion"?"📸 Fotografiar y marcar listo":"✅ Ver"}</button>
      </div>
    ))}
  </div>);
}

function DriView({orders,user,onSel}){
  const mine=orders.filter(o=>o.deliveryPerson===user&&["listo","en_camino"].includes(o.status));
  const avail=orders.filter(o=>o.status==="listo"&&!o.deliveryPerson);
  return(<div className="fade">
    <div className="banner" style={{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)"}}><div><div className="ban-l">Mis despachos</div><div className="ban-n">{mine.length}</div><div className="ban-s">{avail.length} disponibles</div></div></div>
    {mine.length===0?<EmptyState text="Sin entregas activas."/>:mine.map(o=>(
      <div key={o.id} className="tc">
        <div className="tc-top"><div className="tc-icon">💐</div><div style={{flex:1}}><div style={{fontSize:15,fontWeight:800}}>{o.productName}</div><div style={{fontSize:13,color:"var(--text2)",marginTop:2}}>📍 {o.clientAddress}</div></div></div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}><a href={gmap(o.clientAddress)} target="_blank" rel="noreferrer" className="btn-maps" style={{marginTop:0}}>🗺️ Maps</a>{o.clientPhone&&<a href={tel(o.clientPhone)} className="btn-call" style={{marginTop:0}}>📞</a>}{o.clientPhone&&<a href={wa(o.clientPhone)} target="_blank" rel="noreferrer" className="btn-wam" style={{marginTop:0,marginLeft:0}}>💬</a>}</div>
        <button type="button" className="btn-b" onClick={()=>onSel(o)}>{o.status==="listo"?"🚀 Iniciar ruta":"📸 Confirmar entrega"}</button>
      </div>
    ))}
    {avail.length>0&&(<><div className="sh" style={{color:"#1d4ed8"}}>📦 Disponibles <span className="sh-cnt">{avail.length}</span></div>{avail.map(o=><OrdCard key={o.id} o={o} onClick={()=>onSel(o)}/>)}</>)}
  </div>);
}

function EmptyState({text}){return(<div className="empty"><span className="empty-ic">🌿</span><div className="empty-txt">{text}</div></div>);}

/* ══════════════════════════════════════════════════
   📺 MODO TV — Panel general para el televisor del taller
   • Reloj en tiempo real
   • Todos los pedidos activos con colores por estado
   • Paginación automática cada 8 segundos
   • Alerta visual + sonido cuando entra pedido nuevo
   • Barra de entregados hoy en la parte inferior
══════════════════════════════════════════════════ */
function TVCard({ o }) {
  const [now, setNow] = React.useState(Date.now());
  const cfg = SC[o.status] || SC.pendiente;

  /* Timer en vivo — actualiza cada 30 seg */
  React.useEffect(() => {
    const iv = setInterval(() => setNow(Date.now()), 30000);
    return () => clearInterval(iv);
  }, []);

  const elapsed   = o.finishedAt ? o.finishedAt - o.createdAt : now - o.createdAt;
  const timerLabel = o.finishedAt
    ? "✓ Elaborado en " + formatTime(o.finishedAt - o.createdAt)
    : "⏱ " + formatTime(elapsed) + " transcurridos";
  const timerClass = o.finishedAt ? "done" : "running";

  return (
    <div className={"tv-card" + (o.urgente ? " tv-urg" : "") + " tv-" + o.status}>
      <div className="tv-status-strip" style={{ background: cfg.dot }} />

      <div className="tv-card-head">
        <span className="tv-badge" style={{ color: cfg.color, background: cfg.bg }}>
          <span style={{ width: ".6vw", height: ".6vw", borderRadius: "50%", background: cfg.dot, display: "inline-block", marginRight: ".3vw" }} />
          {cfg.label}
        </span>
        {o.urgente && <span className="tv-urg-pill">⚡ URGENTE</span>}
      </div>

      <div className="tv-prod-name">{o.productName}</div>

      <div className="tv-card-info">
        <div className="tv-info-row">👤 <strong>{o.clientName}</strong></div>
        <div className="tv-info-row">✂️ <strong>{o.decorator}</strong></div>
        <div className="tv-info-row">⏰ <strong>{o.deliveryTime || "Flexible"}</strong></div>
        <div className="tv-info-row">🛵 <strong>{o.deliveryPerson || "Por asignar"}</strong></div>
      </div>

      {o.notes && <div className="tv-note-tv">📝 "{o.notes}"</div>}

      <div className={"tv-timer " + timerClass}>{timerLabel}</div>
    </div>
  );
}

function TVView({ orders, onExit }) {
  const [now,      setNow]      = React.useState(new Date());
  const [page,     setPage]     = React.useState(0);
  const [alert,    setAlert]    = React.useState(null);
  const prevLen = React.useRef(0);

  /* Reloj — actualiza cada segundo */
  React.useEffect(() => {
    const iv = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(iv);
  }, []);

  /* Pedidos activos (excluyendo entregados) ordenados por urgencia y estado */
  const active = React.useMemo(() =>
    orders
      .filter(o => o.status !== "entregado" && isToday(o.createdAt))
      .sort((a, b) => {
        if (a.urgente && !b.urgente) return -1;
        if (!a.urgente && b.urgente) return 1;
        return STATUS_ORDER.indexOf(a.status) - STATUS_ORDER.indexOf(b.status);
      }),
    [orders]
  );

  /* Pedidos entregados hoy para la barra inferior */
  const delivered = orders.filter(o => o.status === "entregado" && isToday(o.createdAt));

  /* Estadísticas del día */
  const stats = [
    { key:"pendiente",     label:"Pendientes" },
    { key:"en_produccion", label:"En taller" },
    { key:"listo",         label:"Listos" },
    { key:"en_camino",     label:"En ruta" },
    { key:"entregado",     label:"Entregados" },
  ].map(s => ({ ...s, ...SC[s.key], count: orders.filter(o => o.status === s.key && isToday(o.createdAt)).length }))
   .filter(s => s.count > 0);

  /* Paginación automática cada 8 segundos */
  const PER_PAGE   = 6;
  const totalPages = Math.max(1, Math.ceil(active.length / PER_PAGE));
  const pageItems  = active.slice(page * PER_PAGE, (page + 1) * PER_PAGE);

  React.useEffect(() => {
    if (totalPages <= 1) { setPage(0); return; }
    const iv = setInterval(() => setPage(p => (p + 1) % totalPages), 8000);
    return () => clearInterval(iv);
  }, [totalPages]);

  /* Detectar pedido nuevo → alerta visual + sonido */
  React.useEffect(() => {
    if (prevLen.current > 0 && active.length > prevLen.current) {
      const newest = active[0];
      setAlert(newest);
      playChime(newest?.urgente ? "alert" : "new");
      setTimeout(() => setAlert(null), 4000);
    }
    prevLen.current = active.length;
  }, [active.length]);

  /* Reloj formateado */
  const timeStr = now.toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  const dateStr = now.toLocaleDateString("es-CO",  { weekday: "long", day: "numeric", month: "long" });

  /* Clase del grid según cantidad de cards */
  const gridClass = "tv-g-" + Math.min(pageItems.length, 6);

  return (
    <div className="tv-wrap">
      {alert && (
        <div className="tv-new-alert">
          🌸 NUEVO PEDIDO — {alert.productName}{alert.urgente ? " ⚡ URGENTE" : ""}
        </div>
      )}

      {/* HEADER: logo + nombre + reloj */}
      <div className="tv-hdr">
        <div className="tv-brand">
          <img src={LIZ_LOGO} className="tv-logo" onError={e => e.target.style.display="none"} alt="" />
          <div>
            <div className="tv-hdr-name">Floristería Liz — Panel de Producción</div>
            <div className="tv-hdr-sub" style={{ textTransform:"capitalize" }}>{dateStr}</div>
          </div>
        </div>
        <div className="tv-clock">{timeStr}</div>
      </div>

      {/* STATS + paginación */}
      <div className="tv-stats-bar">
        {stats.map(s => (
          <div key={s.key} className="tv-stat-item">
            <span className="tv-stat-dot" style={{ background: s.dot }} />
            <span className="tv-stat-lbl">{s.label}</span>
            <span className="tv-stat-n">{s.count}</span>
          </div>
        ))}
        {totalPages > 1 && (
          <div className="tv-pager">
            {Array.from({ length: totalPages }).map((_, i) => (
              <div key={i} className={"tv-pager-dot" + (i === page ? " on" : "")} />
            ))}
          </div>
        )}
      </div>

      {/* GRID de pedidos */}
      {active.length === 0 ? (
        <div className="tv-empty">
          <div className="tv-empty-ic">✅</div>
          <div className="tv-empty-txt">Sin pedidos activos — ¡Todo al día!</div>
        </div>
      ) : (
        <div className={"tv-grid " + gridClass}>
          {pageItems.map(o => <TVCard key={o.id} o={o} />)}
        </div>
      )}

      {/* BARRA inferior — entregados hoy */}
      {delivered.length > 0 && (
        <div className="tv-done-bar">
          <span className="tv-done-lbl">✅ Entregados hoy: {delivered.length}</span>
          {delivered.slice(0, 6).map(o => (
            <span key={o.id} className="tv-done-item">
              {o.productName} → 🛵 {o.deliveryPerson || "—"}
              {o.finishedAt && <span style={{ marginLeft: ".4vw", color: "#22c55e" }}>({formatTime(o.finishedAt - o.createdAt)})</span>}
            </span>
          ))}
        </div>
      )}

      {/* Botón salir — muy discreto, esquina inferior derecha */}
      <button type="button" className="tv-exit-btn" onClick={onExit}>✕ Salir TV</button>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<FloristeriaLizApp/>);

</script>
</body>
</html>
